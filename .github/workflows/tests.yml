name: tests

on:
  push:
  pull_request:

jobs:
  windows-py310:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      REUI_DISABLE_AUTO_START: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-ci.txt
      - name: Fix PROJ_DATA for rasterio+pyproj compatibility
        shell: pwsh
        run: |
          $proj_data = & python -c "import rasterio, os; print(os.path.join(os.path.dirname(rasterio.__file__), 'proj_data'))"
          Add-Content -Path $env:GITHUB_ENV -Value "PROJ_LIB=$proj_data"
          Add-Content -Path $env:GITHUB_ENV -Value "PROJ_DATA=$proj_data"
          Write-Host "PROJ paths set to: $proj_data"
      - run: python -m compileall -q .
      - run: python -m pytest -q
